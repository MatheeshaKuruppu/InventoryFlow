<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="InventoryFlow — a modern inventory management dashboard for products, stock, categories and analytics."
    />
    <title>InventoryFlow — Inventory Management Dashboard</title>
    <script>
      // Apply the persisted theme before paint to avoid a flash of incorrect theme.
      (function () {
        try {
          var theme = localStorage.getItem('inventoryflow.theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
